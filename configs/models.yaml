detection:
  engine: "yolov8_detector"
  backbone: "yolov8n"
  box_thresh: 0.05
  unclip_ratio: 1.5
  vlm_refiner:
    enabled: true
    trigger_threshold: 0.4

recognition:
  engine: "trocr_engine"
  model_path: "microsoft/trocr-base-handwritten"
  max_length: 32
  beam_size: 5
  lattice:
    top_k: 5
    include_logprobs: true

reasoning:
  engine: "llm_reconstruction"
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  temperature: 0.2
  top_p: 0.9
  # Balancing Visual (OCR) vs. Linguistic (LLM) weights
  optimization:
    lambda_visual: 0.65
    lambda_linguistic: 0.35

validation:
  engine: "vlm_validator"
  model_name: "HuggingFaceTB/SmolVLM-Instruct"
  hallucination_guard: true
  cross_modal_threshold: 0.75 

vlm:
  model_name: HuggingFaceTB/SmolVLM-Instruct